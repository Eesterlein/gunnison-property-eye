version: "3.9"

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: property_eye_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-property_eye}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: property_eye_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-property_eye}
      GEE_SERVICE_ACCOUNT: ${GEE_SERVICE_ACCOUNT:-}
      GEE_KEY_FILE: ${GEE_KEY_FILE:-/app/secrets/gee-key.json}
      JWT_SECRET: ${JWT_SECRET:-changeme}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/scripts:/app/scripts
      - ./data:/app/data
      - ./secrets:/app/secrets:ro
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
